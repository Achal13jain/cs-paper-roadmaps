name: "🏷️ PR Metadata"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Skip metadata writes in read-only PR context
        if: github.event_name == 'pull_request'
        run: echo "PR metadata writes are handled by pull_request_target when this workflow is on main."

      - name: Summarise papers.yml changes and label PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const pull_number = context.payload.pull_request.number;
            const marker = "<!-- cs-paper-roadmaps-pr-summary -->";

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const papersFile = files.find((file) => file.filename === "papers.yml");
            const patch = papersFile?.patch || "";
            const newTitles = [...patch.matchAll(/^\+\s{8}title:\s*(.+)$/gm)]
              .map((match) => match[1].trim().replace(/^['"]|['"]$/g, ""))
              .filter(Boolean);

            const body = [
              marker,
              "## Contribution Summary",
              "",
              newTitles.length
                ? `New or changed paper titles detected:\n${newTitles.map((title) => `- ${title}`).join("\n")}`
                : "No new paper titles were detected in `papers.yml`.",
              "",
              "Automated validation and link checks run in the separate validation workflow."
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ["needs-review"],
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: "needs-review",
                color: "f9d0c4",
                description: "Awaiting maintainer review",
              });
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ["needs-review"],
              });
            }
