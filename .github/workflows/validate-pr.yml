name: "✅ Validate Contribution"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pyyaml jsonschema requests

      - name: Validate papers.yml
        run: python scripts/validate_papers.py

      - name: Check paper links
        run: python scripts/check_links.py

      - name: Summarise papers.yml changes
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require("child_process");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const baseRef = context.payload.pull_request.base.ref;

            execSync(`git fetch origin ${baseRef} --depth=1`, { stdio: "ignore" });

            let diff = "";
            try {
              diff = execSync(`git diff origin/${baseRef}...HEAD -- papers.yml`, { encoding: "utf8" });
            } catch (error) {
              diff = error.stdout?.toString() || "";
            }

            const newTitles = [...diff.matchAll(/^\+\s{4}title:\s*(.+)$/gm)]
              .map((match) => match[1].trim().replace(/^['"]|['"]$/g, ""))
              .filter(Boolean);

            const body = [
              "## Contribution Summary",
              "",
              newTitles.length
                ? `New or changed paper titles detected:\n${newTitles.map((title) => `- ${title}`).join("\n")}`
                : "No new paper titles were detected in `papers.yml`.",
              "",
              "Automated validation and link checks have completed for this PR."
            ].join("\n");

            await github.rest.issues.createComment({ owner, repo, issue_number, body });
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ["needs-review"] });
