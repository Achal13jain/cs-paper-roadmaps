name: "👋 Greet Contributor"

on:
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: read

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "👋 Thanks for contributing to CS Paper Roadmaps!",
              "",
              "Here's what happens next:",
              "1. ✅ Automated checks will validate your YAML and verify all links are accessible.",
              "2. 👀 The maintainer will manually review your paper(s) for quality and fit.",
              "3. 🚀 Once merged, the site rebuilds automatically — your contribution goes live within minutes.",
              "",
              "If checks fail, scroll up to see which validation step failed and fix it in your branch. Feel free to ask questions in this PR if you're stuck!"
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
